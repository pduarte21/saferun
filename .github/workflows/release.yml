name: Release saferun

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build for ${{ matrix.platform.name }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary_name: saferun
            asset_name: saferun-linux-x86_64

          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            binary_name: saferun
            asset_name: saferun-macos-aarch64

          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: saferun.exe
            asset_name: saferun-windows-x86_64.exe

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.platform.target }}

      - name: Build binary
        run: cargo build --release --target ${{ matrix.platform.target }}

      - name: Prepare asset (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary_name }} dist/${{ matrix.platform.asset_name }}

      - name: Prepare asset (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.platform.target }}/release/${{ matrix.platform.binary_name }}" "dist/${{ matrix.platform.asset_name }}"

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*